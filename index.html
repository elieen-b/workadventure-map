<!DOCTYPE html>
<html>
<head>
  <title>Meine Insel Karte</title>
</head>
<body>

<h2>Rügen Karte</h2>
<canvas id="mapCanvas"></canvas>

<script>
fetch("ruegen-map.json")

.then(response => response.json())

.then(map => {

  const data = map.index;
  const width = map.width;
  const height = map.height;
  const tileSize = 8;

  const canvas = document.getElementById("mapCanvas");
  canvas.width = width * tileSize;
  canvas.height = height * tileSize;
  const ctx = canvas.getContext("2d");
  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {
      const value = data[y * width + x];
      if (value === 0) {
        ctx.fillStyle = "#4da6ff"; // Wasser

      } else if (value === 1) {
        ctx.fillStyle = "#66cc66"; // Land

      } else {
        ctx.fillStyle = "#d9b38c"; // Küste

      }

      ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);

    }

  }

})

.catch(error => {
  document.body.innerHTML += "<p>Fehler beim Laden der map.json</p>";
  console.error(error);
});
</script>

</body>
</html>
